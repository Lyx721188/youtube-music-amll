<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>AMLL 渲染测试</title>
<style>
	html,body{margin:0;height:100%;background:#111;color:#fff;font-family:sans-serif}
	#info{position:fixed;top:8px;left:12px;z-index:10;font-size:13px;opacity:.7}
	#err{position:fixed;bottom:8px;left:12px;z-index:10;font-size:12px;color:#f66;max-width:90%;white-space:pre-wrap}
</style>
</head>
<body>
<div id="info">AMLL 渲染测试 · 若看到滚动歌词即组件正常</div>
<div id="err"></div>
<script>
	window.addEventListener("error", e => {
		var el = document.getElementById("err");
		el.textContent += "\\nERROR: " + e.message + " @ " + (e.filename||"") + ":" + (e.lineno||"");
	});
	window.addEventListener("unhandledrejection", e => {
		var el = document.getElementById("err");
		el.textContent += "\\nREJECT: " + (e.reason && e.reason.stack || e.reason);
	});
</script>
<script src="../dist/test-entry.js"></script>
</body>
</html>
